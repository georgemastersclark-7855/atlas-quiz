<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Atlas Testosterone Vitality Check</title>

<!-- Fraunces = web stand-in for GT Alpina · Inter = stand-in for Söhne (swap for licensed fonts on live build) -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f2f2f0; --paper:#ffffff; --ink:#212121; --ink-soft:#54514b; --ink-faint:#8a8780;
    --line:#e2ded4; --green:#0a3622; --green-d:#002c17; --forest:#002c17; --rust:#8a8780;
    --amber:#b98c1d; --red:#a8442f;
    --grad:linear-gradient(90deg,#a8442f 0%,#b98c1d 50%,#0a3622 100%);
    --serif:"Fraunces",Georgia,serif; --sans:"Inter",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#e6e4de;color:var(--ink);font-family:var(--sans)}
  .app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--cream);display:flex;flex-direction:column;position:relative;overflow:hidden}
  .top{position:sticky;top:0;z-index:20;padding:14px 18px 11px;background:linear-gradient(180deg,var(--cream) 70%,rgba(244,241,234,.7))}
  .brandrow{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .logo{width:26px;height:26px;border-radius:6px;background:var(--green);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:500;font-size:16px;color:var(--cream)}
  .brand{font-family:var(--sans);font-weight:800;letter-spacing:.12em;font-size:17px;color:var(--ink)}
  .back{margin-left:auto;color:var(--ink-faint);font-size:13px;background:none;border:0;cursor:pointer;visibility:hidden}
  .bar{height:5px;border-radius:99px;background:#e4ded2;overflow:hidden}
  .fill{height:100%;width:0;border-radius:99px;background:var(--green);transition:width .5s cubic-bezier(.4,0,.2,1)}
  .step{margin-top:6px;font-size:11px;color:var(--ink-faint);letter-spacing:.03em}
  .wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:18px 18px 30px}
  .screen{opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease}
  .screen.in{opacity:1;transform:none}
  .eyebrow{color:var(--rust);font-family:var(--sans);font-weight:600;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:11px}
  h1{font-family:var(--sans);font-weight:800;font-size:28px;line-height:1.16;letter-spacing:-.012em;margin:0 0 12px}
  h2{font-family:var(--serif);font-style:italic;font-weight:400;font-size:27px;line-height:1.18;letter-spacing:-.01em;margin:0 0 8px}
  p.sub{color:var(--ink-soft);font-size:15px;line-height:1.55;margin:0 0 20px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:center;gap:12px;padding:16px 15px;border:1.5px solid var(--line);border-radius:12px;background:var(--paper);cursor:pointer;font-size:16px;font-weight:500;transition:.16s;user-select:none}
  .opt:hover{border-color:#cdc6b7}
  .opt .tick{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid #d7d0c2;flex:0 0 auto;transition:.16s}
  .opt.sel{border-color:var(--green);background:#f3f8f4}
  .opt.sel .tick{border-color:var(--green);background:var(--green);box-shadow:inset 0 0 0 3px var(--paper)}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tile{padding:20px 14px;text-align:center;border:1.5px solid var(--line);border-radius:13px;background:var(--paper);cursor:pointer;font-family:var(--serif);font-weight:800;font-size:20px;transition:.16s}
  .tile:hover{border-color:var(--green)}
  .tile small{display:block;font-family:var(--sans);color:var(--ink-faint);font-weight:500;font-size:11px;letter-spacing:.04em;text-transform:uppercase;margin-top:4px}
  .btn{display:block;width:100%;border:0;border-radius:12px;padding:17px;font-size:15px;font-weight:600;color:var(--cream);background:var(--green);cursor:pointer;margin-top:20px;letter-spacing:.02em;transition:.15s}

  .micro{text-align:center;color:var(--ink-faint);font-size:12px;margin-top:13px;line-height:1.5}
  .seg{display:flex;gap:6px;background:#ece7dc;border-radius:11px;padding:4px;margin:0 0 12px}
  .seg button{flex:1;border:0;background:none;padding:10px;border-radius:8px;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer}
  .seg button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .slabel{display:flex;justify-content:space-between;color:var(--ink-faint);font-size:13px;margin:24px 4px 8px}
  input[type=range]{width:100%;-webkit-appearance:none;height:7px;border-radius:99px;background:var(--grad);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;border:4px solid var(--green);cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.25)}
  .slval{text-align:center;font-family:var(--serif);font-size:48px;font-weight:800;margin:14px 0 0;color:var(--green)}
  .field{display:flex;gap:10px;margin-top:6px}
  .inp{flex:1;background:var(--paper);border:1.5px solid var(--line);border-radius:11px;padding:16px;color:var(--ink);font-size:16px;font-weight:500;font-family:var(--sans)}
  .inp:focus{outline:none;border-color:var(--green)}
  .inp::placeholder{color:var(--ink-faint)}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:22px;text-align:center}
  .card.warn{border-color:#e6cdc6;background:linear-gradient(180deg,#fbf2f0,var(--paper))}
  .icon{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:27px;margin:0 auto 14px}
  .icon.ok{background:#eaf3ee;color:var(--green)} .icon.warn{background:#f6e7e3;color:var(--red)}
  .card p{color:var(--ink-soft);font-size:15px;line-height:1.6;margin:8px 0 0}
  .cite{color:var(--ink-faint);font-size:11px;margin-top:14px;font-style:italic}
  .slidein{margin:16px -2px 2px;height:118px;border-radius:11px;background:#ece7dc;border:1px dashed #cdc6b7;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:11px;letter-spacing:.04em;transform:translateX(50px);opacity:0;transition:.6s .15s}
  .screen.in .slidein{transform:none;opacity:1}
  .hero{height:170px;border-radius:13px;background:#ece7dc;border:1px dashed #cdc6b7;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:11px;letter-spacing:.04em;text-align:center;margin:8px 0 4px;padding:0 16px}
  .heroimg{width:100%;height:190px;object-fit:cover;object-position:50% 26%;border-radius:13px;display:block;margin:8px 0 4px}
  .bimg img{width:100%;height:100%;object-fit:cover;object-position:50% 32%}
  .slidein img{width:100%;height:100%;object-fit:cover;object-position:50% 28%}
  .btiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btile{border:1.5px solid var(--line);border-radius:13px;background:var(--paper);cursor:pointer;overflow:hidden;transition:.16s;text-align:center;padding-bottom:12px}
  .btile:hover{border-color:#cdc6b7}
  .btile.sel{border-color:var(--green);background:#f3f8f4}
  .bimg{height:128px;background:#ece7dc;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:11px;margin-bottom:10px}
  .btile span{font-size:14px;font-weight:600;padding:0 8px;display:block;line-height:1.3}
  .btile.sel span{color:var(--green)}
  .graph{width:100%;height:auto;display:block;margin:10px 0 4px}
  .ringwrap{display:flex;flex-direction:column;align-items:center;gap:18px;padding:24px 0}
  .ring{transform:rotate(-90deg)}
  .pct{font-family:var(--serif);font-size:42px;font-weight:800;color:var(--green)}
  .calcq{color:var(--ink-soft);font-size:14px;text-align:center}
  .modal{position:absolute;inset:0;background:rgba(20,20,15,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;z-index:40}
  .sheet{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:26px 22px;max-width:380px;width:100%;text-align:center}
  .sheet .row{display:flex;gap:10px;margin-top:18px}
  .sheet .row .btn{margin:0}
  .btn.alt{background:var(--paper);color:var(--ink-soft);border:1.5px solid var(--line)}
  .btn.alt:hover{background:#f6f3ec}
  .score-num{font-family:var(--serif);font-size:66px;font-weight:800;line-height:1;text-align:center}
  .meter{height:11px;border-radius:99px;background:var(--grad);position:relative;margin:10px 2px 4px}
  .marker{position:absolute;top:-7px;width:5px;height:25px;border-radius:4px;background:var(--ink);left:0;transform:translateX(-2px);transition:left 1s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
  .mscale{display:flex;justify-content:space-between;color:var(--ink-faint);font-size:11px;margin:0 2px}
  .read{margin-top:18px;display:flex;flex-direction:column;gap:11px}
  .rrow{display:flex;align-items:center;gap:12px;font-size:14px}
  .rrow .lab{width:108px;color:var(--ink-soft);flex:0 0 auto}
  .rbar{flex:1;height:8px;border-radius:99px;background:#e4ded2;overflow:hidden}
  .rbar i{display:block;height:100%;width:0;border-radius:99px;transition:width .9s ease}
  .rstat{width:54px;text-align:right;font-weight:600;font-size:12px;flex:0 0 auto}
  .pill{display:inline-block;background:#f6e7e3;color:var(--red);border:1px solid #ecd5cf;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;margin-top:16px}
  .ba{display:flex;gap:9px;margin:4px 0 12px}
  .ba .c{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .ba .c .k{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.07em}
  .ba .c .v{font-family:var(--serif);font-weight:800;font-size:17px;margin-top:5px}
  .ba .c .v.bad{color:var(--rust)} .ba .c .v.good{color:var(--green)}
  .nopill{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:6px 0 16px}
  .nopill span{font-size:12px;font-weight:600;color:var(--green);background:#eaf3ee;border:1px solid #d3e6da;border-radius:99px;padding:5px 11px}
  .tier{border:1.5px solid var(--line);border-radius:13px;padding:15px;margin-bottom:11px;position:relative;background:var(--paper);cursor:pointer}
  .tier.best{border-color:var(--green);box-shadow:0 0 0 3px rgba(10,54,34,.12)}
  .tier.sel{border-color:var(--green);box-shadow:0 0 0 3px rgba(10,54,34,.16)}
  .tier .tag{position:absolute;top:-10px;left:15px;background:var(--forest);color:var(--cream);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:5px}
  .tier .tt{display:flex;justify-content:space-between;align-items:baseline}
  .tier .nm{font-family:var(--serif);font-weight:800;font-size:18px} .tier .pr{font-family:var(--serif);font-weight:800;font-size:19px}
  .tier .sup{color:var(--ink-faint);font-size:12px;margin-top:3px}
  .gtee{text-align:center;color:var(--ink-faint);font-size:12.5px;margin-top:8px}
  .branch{color:var(--green);font-weight:600}
  .flag{font-size:10px;color:var(--ink-faint);border:1px dashed #cdc6b7;border-radius:5px;padding:2px 6px;margin-left:6px;vertical-align:middle}
  .cmp{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--paper);margin:6px 0 4px}
  .cmp .row{display:grid;grid-template-columns:1fr 70px 70px;padding:12px 14px;border-bottom:1px solid var(--line);align-items:center;font-size:14.5px}
  .cmp .row:last-child{border-bottom:0}
  .cmp .row b{font-weight:600} .cmp .row span{text-align:right;font-weight:700}
  .cmp .row .now{color:var(--red)} .cmp .row .aft{color:var(--green)}
  .cmp .row.hd{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);background:#faf8f3}
  .cmp .row.hd span{font-weight:600;color:var(--ink-faint)}
  .statcall{background:#f4f3ef;border:1px dashed #d9d6cd;color:var(--ink-faint);border-radius:10px;padding:12px;font-size:12px;text-align:center;margin:14px 0}
  .sech{font-family:var(--serif);font-weight:800;font-size:21px;text-align:center;margin:30px 0 12px}
  .bullets{list-style:none;padding:0;margin:10px 0 0;display:flex;flex-direction:column;gap:9px}
  .bullets li{position:relative;padding-left:26px;font-size:14.5px;color:var(--ink-soft);line-height:1.5}
  .bullets li:before{content:"✓";position:absolute;left:0;top:0;color:var(--green);font-weight:800}
  .pay{text-align:center;color:var(--ink-faint);font-size:12px;margin-top:10px}
  .rating{text-align:center;margin:26px 0}
  .rating .stars{color:#c8a24a;font-size:22px;letter-spacing:2px}
  .rating .rnum{font-size:12px;color:var(--ink-faint);margin-top:4px;border:1px dashed #cdc6b7;border-radius:5px;display:inline-block;padding:2px 8px}
  .compounds{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cc{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:13px}
  .cc b{display:block;font-size:14px;margin-bottom:3px} .cc span{font-size:12.5px;color:var(--ink-faint);line-height:1.4}
  .authority{display:flex;gap:10px;justify-content:center}
  .authority span{flex:1;height:46px;background:#ece7dc;border:1px dashed #cdc6b7;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:10px}
  .review{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:10px}
  .review .rs{color:#c8a24a;font-size:13px;letter-spacing:1px}
  .review p{font-size:14px;color:var(--ink-soft);margin:6px 0 8px;line-height:1.5}
  .review .who{font-size:12px;color:var(--ink-faint)}
  .gbox{border:1.5px solid var(--green);border-radius:13px;padding:18px;text-align:center;margin:24px 0}
  .gbox b{font-family:var(--serif);font-weight:800;font-size:18px}
  .gbox p{font-size:13.5px;color:var(--ink-soft);margin:8px 0 0;line-height:1.55}
  .faq{margin-top:24px;border-top:1px solid var(--line)}
  .faq details{border-bottom:1px solid var(--line)}
  .faq summary{font-weight:600;font-size:15px;cursor:pointer;list-style:none;padding:14px 0;position:relative}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary::after{content:"+";position:absolute;right:2px;top:12px;color:var(--ink-faint);font-size:18px}
  .faq details[open] summary::after{content:"–"}
  .faq p{font-size:14px;color:var(--ink-soft);margin:0 0 14px;line-height:1.55}
  /* Desktop two-pane */
  .stage{min-height:100vh}
  .brandpane{display:none}

    html,body{background:var(--green-d)}

    .brandpane:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,30,18,.30),rgba(0,30,18,.92))}
    .brandpane .bp{position:relative;z-index:2;padding:54px 54px 58px;max-width:540px}
    .bp-logo{font-family:var(--sans);font-weight:800;letter-spacing:.14em;font-size:20px;margin-bottom:20px}
    .bp-head{font-family:var(--serif);font-style:italic;font-weight:400;font-size:36px;line-height:1.13;margin:0 0 14px}
    .bp-sub{font-size:15px;line-height:1.6;color:rgba(242,242,240,.82);max-width:420px;margin:0}
    .app{max-width:none;flex:0 0 540px;width:540px}
  }
  @media(min-width:1280px){ .app{flex:0 0 600px;width:600px} }
  @media(min-width:900px){ .cover-hero{display:none} }
  .sesub{text-align:center;color:var(--ink-soft);font-size:13.5px;margin:6px 0 14px}
  .pintro{background:var(--green-d);border-radius:18px;overflow:hidden;margin:6px 0 4px;color:var(--cream)}
  .pintro img{width:100%;display:block}
  .pi{padding:22px 20px 24px}
  .pi-ev{color:rgba(242,242,240,.62);font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase}
  .pi-name{font-weight:800;font-size:25px;color:var(--cream);margin-top:7px;letter-spacing:.01em}
  .pi-ing{font-size:12px;color:rgba(242,242,240,.7);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
  .pi-p{font-size:14.5px;color:rgba(242,242,240,.86);line-height:1.55;margin:13px 0 0}

  .piticks li{position:relative;padding-left:24px;font-size:13.5px;color:var(--cream)}
  .piticks li:before{content:"✓";position:absolute;left:0;color:#9ccbb0;font-weight:800}
  .ingt{border:1px solid var(--line);border-radius:13px;background:var(--paper);overflow:hidden;margin-top:2px}
  .ingt .r{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .ingt .r:last-child{border-bottom:0}
  .ingt .inm{font-weight:700;font-size:14.5px}
  .ingt .ids{font-size:12.5px;color:var(--ink-faint);margin-top:2px}
  .ingt .dose{font-family:var(--serif);font-weight:800;font-size:17px;color:var(--green);flex:0 0 auto}
  .ingt .tot{display:flex;justify-content:space-between;padding:13px 16px;background:#f3f8f4;font-weight:700;font-size:13.5px}
  .stats{display:flex;gap:8px;margin-top:4px}
  .stats .s{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px 6px;text-align:center}
  .stats .v{font-family:var(--serif);font-weight:800;font-size:23px;color:var(--green)}
  .stats .k{font-size:10px;color:var(--ink-faint);line-height:1.3;margin-top:5px}
  .statnote{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:8px}
  .ph{font-size:11px;color:var(--ink-faint);border:1px dashed #cdc6b7;border-radius:6px;padding:8px 10px;text-align:center;margin-top:10px;background:#faf8f3}
  .qsel-h{font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin:4px 0 12px}
  .qcards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .qcard{position:relative;background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:12px 7px 13px;text-align:center;cursor:pointer;transition:.15s}
  .qcard.sel{border-color:var(--green);background:#f3f8f4;box-shadow:0 0 0 3px rgba(10,54,34,.12)}
  .qcard img{width:84%;aspect-ratio:1/1;object-fit:cover;border-radius:9px;display:block;margin:0 auto 8px;background:#f1efea}
  .qcard .qn{font-weight:700;font-size:13.5px}
  .qcard .qs{font-size:10.5px;color:var(--ink-faint);margin-top:2px}
  .qcard .qd{font-size:10px;font-weight:700;color:var(--green);margin-top:4px;line-height:1.2}
  .qbadge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--green);color:var(--cream);font-weight:700;font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:3px 10px;border-radius:999px}
  .qprice{display:flex;align-items:center;gap:10px;margin:16px 2px 0}
  .qprice .pnow{font-family:var(--serif);font-weight:800;font-size:26px;color:var(--ink)}
  .qprice .pwas{color:var(--ink-faint);font-size:14px;text-decoration:line-through}
  .qprice .psave{margin-left:auto;font-weight:700;font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:var(--green);background:#eaf3ee;border:1px solid #d3e6da;border-radius:999px;padding:5px 11px}
  .foot{font-size:10.5px;color:var(--ink-faint);line-height:1.5;margin-top:24px;text-align:center}
</style>

  }
  if(['comp','card','celebrate','results'].includes(sc.type)) cont(()=>go(1));
  if(sc.type==='cover') cont(()=>{ track('ViewContent',{content_name:'quiz_start'}); go(1); });
  if(sc.type==='results') track('ViewContent',{content_name:'quiz_results'});
  if(sc.type==='email'){ cont(()=>{ S.a.email=screen.querySelector('#em').value; submitLead(S.a.email); go(1); }); const sk=screen.querySelector('#skip'); if(sk) sk.onclick=()=>go(1); }
  if(sc.type==='offer'){
    var cards=screen.querySelectorAll('.qcard');
    function qpick(c){ cards.forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); S.tier=c.dataset.vid;
      screen.querySelector('#qp-now').textContent='$'+c.dataset.price;
      var w=screen.querySelector('#qp-was'); if(c.dataset.was){ w.textContent='$'+c.dataset.was; w.style.display=''; } else { w.style.display='none'; }
      var sv=screen.querySelector('#qp-save'); if(c.dataset.save){ sv.textContent='Save $'+c.dataset.save; sv.style.display=''; } else { sv.style.display='none'; } }
    cards.forEach(c=>c.onclick=()=>qpick(c));
    var cta=screen.querySelector('#qp-cta'); if(cta){ cta.onclick=()=>{ track('InitiateCheckout'); location.href='https://tryatlasnutrition.com/cart/'+S.tier+':1'; }; }
  }
  if(sc.type==='profile'){ const v=+screen.querySelector('#cont').dataset.v; countUp(screen.querySelector('#sn'),v); setTimeout(()=>screen.querySelector('#mk').style.left=v+'%',350); setTimeout(()=>screen.querySelectorAll('.rbar i').forEach(i=>i.style.width=i.dataset.w+'%'),450); cont(()=>go(1)); }
  if(sc.type==='calc') runCalc();
}
function cont(fn){ const b=screen.querySelector('#cont'); if(b) b.onclick=fn; }
function countUp(el,to){ let n=0; const step=Math.max(1,Math.round(to/26)); const id=setInterval(()=>{ n+=step; if(n>=to){n=to;clearInterval(id);} el.textContent=n; },26); }
function runCalc(){
  const rc=screen.querySelector('#rc'),pct=screen.querySelector('#pct'); let p=0,paused=false; const C=396;
  const id=setInterval(()=>{ if(paused)return; p+=2; if(p>100)p=100; rc.style.strokeDashoffset=C-(C*p/100); pct.textContent=p+'%';
    if(p===54){ paused=true; showCalcModal(()=>paused=false); } if(p>=100){ clearInterval(id); setTimeout(()=>go(1),500); } },45);
}
function showCalcModal(resume){
  const m=document.createElement('div'); m.className='modal';
  m.innerHTML=`<div class="sheet"><h2>One thing first.</h2><p style="color:var(--ink-soft);font-size:15px;margin:8px 0 0">Do you actually want to feel like yourself again?</p><div class="row"><button class="btn alt" id="no">Not really</button><button class="btn" id="yes">Yes</button></div></div>`;
  document.getElementById('app').appendChild(m);
  m.querySelector('#yes').onclick=()=>{ m.remove(); resume(); };
  m.querySelector('#no').onclick=()=>{ m.remove(); resume(); };
}
backBtn.onclick=()=>{ if(S.i>0){ S.i--; render(); } };
(function deeplink(){
  const j=new URLSearchParams(location.search).get('screen'); if(!j) return;
  Object.assign(S.a,{age:'40-49',energy:'Crashes, I run on caffeine',bodyScore:3,drive:'Mostly flat',mood:'Irritable, low mood and anxiety are common',sleep:'Wired at night, drained all day',focus:3,strength:'Weaker, and I ache for days',libido:'Low',morning:'Rarely',erections:'Often a struggle',confidence:'Low'});
  const map={report:'profile',score:'profile'}; const t=map[j]||j;
  const i=SCREENS.findIndex(s=>(s.type===t)||(s.variant===t)); if(i>=0) S.i=i;
})();
render();
</script>
